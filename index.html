<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Glass Loading</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            background: #000000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            color: #ffffff;
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: #8e8e93;
            font-size: 15px;
            margin-bottom: 30px;
        }

        .container {
            background: #1c1c1e;
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 600px;
        }

        .upload-area {
            border: 2px dashed #3a3a3c;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 24px;
            position: relative;
            overflow: hidden;
        }

        .upload-area:hover {
            border-color: #0a84ff;
            background: #2c2c2e;
        }

        .upload-area input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }

        .upload-icon {
            width: 48px;
            height: 48px;
            margin-bottom: 12px;
            color: #8e8e93;
        }

        .upload-text {
            font-size: 15px;
            color: #ffffff;
            font-weight: 500;
        }

        .upload-hint {
            font-size: 13px;
            color: #8e8e93;
            margin-top: 4px;
        }

        .controls {
            margin-bottom: 24px;
        }

        .control-group {
            margin-bottom: 20px;
        }

        .control-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: #ffffff;
        }

        .value-badge {
            background: #3a3a3c;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 13px;
            color: #0a84ff;
            font-weight: 600;
            min-width: 45px;
            text-align: center;
        }

        input[type="range"] {
            width: 100%;
            height: 4px;
            border-radius: 2px;
            background: #3a3a3c;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #0a84ff;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(10,132,255,0.3);
            transition: transform 0.1s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
        }

        .preview-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16/10;
            background: #2c2c2e;
            border-radius: 12px;
            overflow: hidden;
            display: none;
            margin-bottom: 20px;
        }

        .preview-container.active {
            display: block;
        }

        .preview-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: blur(var(--blur, 0px));
        }

        .spinner-wrapper {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .spinner-container {
            width: 80px;
            height: 80px;
            position: relative;
            flex-shrink: 0;
        }

        .spinner-bg {
            position: absolute;
            inset: 0;
            background: #484848;
            border-radius: 50%;
            overflow: hidden;
        }

        .spinner-glass {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            opacity: 0.15;
            overflow: hidden;
        }

        .spinner-glass-img {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: var(--container-width, 100vw);
            height: var(--container-height, 100vh);
            object-fit: cover;
            filter: blur(var(--blur, 0px));
        }

        .spinner-arc {
            position: absolute;
            inset: 0;
            border-radius: 50%;
        }

        .spinner-arc svg {
            width: 100%;
            height: 100%;
            animation: spin 1s linear infinite;
        }

        .spinner-arc circle {
            fill: none;
            stroke: #FFFFFF;
            stroke-width: 6.4;
            stroke-linecap: round;
            stroke-dasharray: 22 200;
        }

        .spinner-cross {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .spinner-cross svg {
            width: 51px;
            height: 51px;
        }

        .spinner-cross line {
            stroke: #FFFFFF;
            stroke-width: 4.1;
            stroke-linecap: round;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            flex: 1;
            padding: 14px 24px;
            border-radius: 12px;
            border: none;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .btn-primary {
            background: #0a84ff;
            color: white;
        }

        .btn-primary:hover {
            background: #0a84ff;
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #3a3a3c;
            color: #ffffff;
        }

        .btn-secondary:hover {
            background: #4a4a4c;
        }

        #exportCanvas {
            display: none;
        }

        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(255,255,255,0.9);
            color: #000;
            padding: 14px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .save-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .save-modal.active {
            display: flex;
        }

        .save-modal img {
            max-width: 100%;
            max-height: 70vh;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .save-modal-text {
            color: #fff;
            text-align: center;
            font-size: 17px;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .save-modal-btn {
            background: #0a84ff;
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .loading {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            flex-direction: column;
        }

        .loading.active {
            display: flex;
        }

        .loading-text {
            color: #fff;
            margin-top: 20px;
            font-size: 16px;
        }

        @media (max-width: 480px) {
            body {
                padding: 20px 16px;
            }

            h1 {
                font-size: 24px;
            }

            .container {
                padding: 20px;
            }

            .spinner-container {
                width: 60px;
                height: 60px;
            }

            .spinner-cross svg {
                width: 38px;
                height: 38px;
            }

            .spinner-cross line {
                stroke-width: 3;
            }

            .spinner-arc circle {
                stroke-width: 4.8;
                stroke-dasharray: 16 200;
            }
        }
    </style>
</head>
<body>
    <h1>Telegram Glass Loading</h1>
    <p class="subtitle">Создайте эффект загрузки как в Telegram</p>

    <div class="container">
        <div class="upload-area" id="uploadArea">
            <input type="file" id="fileInput" accept="image/*">
            <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="17 8 12 3 7 8"></polyline>
                <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
            <div class="upload-text">Загрузить фото</div>
            <div class="upload-hint">Нажмите или перетащите изображение</div>
        </div>

        <div class="controls" id="controls" style="display: none;">
            <div class="control-group">
                <div class="control-label">
                    <span>Степень размытия</span>
                    <span class="value-badge" id="blurValue">0px</span>
                </div>
                <input type="range" id="blurSlider" min="0" max="30" value="0" step="0.5">
            </div>
        </div>

        <div class="preview-container" id="previewContainer">
            <img class="preview-image" id="previewImage" alt="Preview">

            <div class="spinner-wrapper">
                <div class="spinner-container">
                    <div class="spinner-bg"></div>
                    <div class="spinner-glass" id="spinnerGlass">
                        <img class="spinner-glass-img" id="spinnerGlassImg" alt="">
                    </div>
                    <div class="spinner-arc" id="spinnerArc">
                        <svg viewBox="0 0 100 100">
                            <circle cx="50" cy="50" r="38"/>
                        </svg>
                    </div>
                    <div class="spinner-cross">
                        <svg viewBox="0 0 51 51">
                            <line x1="15" y1="15" x2="36" y2="36"/>
                            <line x1="36" y1="15" x2="15" y2="36"/>
                        </svg>
                    </div>
                </div>
            </div>
        </div>

        <div class="actions" id="actions" style="display: none;">
            <button class="btn btn-secondary" id="newPhotoBtn">Новое фото</button>
            <button class="btn btn-primary" id="downloadBtn">Сохранить фото</button>
        </div>
    </div>

    <canvas id="exportCanvas"></canvas>
    <div class="toast" id="toast">Фото сохранено!</div>

    <div class="loading" id="loading">
        <div class="spinner-container" style="position: relative;">
            <div class="spinner-bg"></div>
            <div class="spinner-arc">
                <svg viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="38"/>
                </svg>
            </div>
        </div>
        <div class="loading-text">Обработка...</div>
    </div>

    <div class="save-modal" id="saveModal">
        <img id="saveModalImg" src="" alt="Нажмите и удерживайте для сохранения">
        <div class="save-modal-text">
            📱 <b>Удерживайте палец на фото</b><br>
            и выберите «Сохранить изображение»<br><br>
            <small style="color: #8e8e93;">Если не работает — откройте в браузере (⋮ → Открыть в браузере)</small>
        </div>
        <button class="save-modal-btn" onclick="closeSaveModal()">Готово</button>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const controls = document.getElementById('controls');
        const previewContainer = document.getElementById('previewContainer');
        const previewImage = document.getElementById('previewImage');
        const spinnerGlassImg = document.getElementById('spinnerGlassImg');
        const spinnerArc = document.getElementById('spinnerArc');
        const blurSlider = document.getElementById('blurSlider');
        const blurValue = document.getElementById('blurValue');
        const actions = document.getElementById('actions');
        const newPhotoBtn = document.getElementById('newPhotoBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const exportCanvas = document.getElementById('exportCanvas');
        const toast = document.getElementById('toast');
        const saveModal = document.getElementById('saveModal');
        const saveModalImg = document.getElementById('saveModalImg');
        const loading = document.getElementById('loading');

        let currentImage = null;
        let currentBlur = 0;
        let isProcessing = false;

        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
        const isAndroid = /Android/.test(navigator.userAgent);
        const isTelegramWebView = /Telegram/i.test(navigator.userAgent) || window.TelegramWebview !== undefined;

        uploadArea.addEventListener('click', (e) => {
            if (e.target !== fileInput) {
                fileInput.click();
            }
        });

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            e.stopPropagation();
            uploadArea.style.borderColor = '#0a84ff';
        });

        uploadArea.addEventListener('dragleave', (e) => {
            e.preventDefault();
            e.stopPropagation();
            uploadArea.style.borderColor = '#3a3a3c';
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            e.stopPropagation();
            uploadArea.style.borderColor = '#3a3a3c';
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                handleFile(file);
            }
        });

        fileInput.addEventListener('change', (e) => {
            e.stopPropagation();
            const file = e.target.files[0];
            if (file && !isProcessing) {
                isProcessing = true;
                handleFile(file);
                setTimeout(() => {
                    isProcessing = false;
                }, 100);
            }
        });

        function handleFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                currentImage = new Image();
                currentImage.onload = () => {
                    previewImage.src = e.target.result;
                    spinnerGlassImg.src = e.target.result;
                    previewContainer.classList.add('active');
                    controls.style.display = 'block';
                    actions.style.display = 'flex';
                    uploadArea.style.display = 'none';

                    updateContainerSize();

                    blurSlider.value = 10;
                    updateBlur(10);
                };
                currentImage.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function updateContainerSize() {
            const rect = previewContainer.getBoundingClientRect();
            previewContainer.style.setProperty('--container-width', rect.width + 'px');
            previewContainer.style.setProperty('--container-height', rect.height + 'px');
        }

        window.addEventListener('resize', updateContainerSize);

        blurSlider.addEventListener('input', (e) => {
            updateBlur(parseFloat(e.target.value));
        });

        function updateBlur(value) {
            currentBlur = value;
            blurValue.textContent = value + 'px';
            previewContainer.style.setProperty('--blur', value + 'px');
        }

        newPhotoBtn.addEventListener('click', () => {
            currentImage = null;
            currentBlur = 0;

            previewImage.src = '';
            spinnerGlassImg.src = '';
            fileInput.value = '';

            previewContainer.classList.remove('active');
            controls.style.display = 'none';
            actions.style.display = 'none';
            uploadArea.style.display = 'block';

            blurSlider.value = 0;
            blurValue.textContent = '0px';
        });

        function getCurrentRotation() {
            const svg = spinnerArc.querySelector('svg');
            const style = window.getComputedStyle(svg);
            const matrix = new DOMMatrix(style.transform);
            return Math.atan2(matrix.b, matrix.a) * (180 / Math.PI);
        }

        downloadBtn.addEventListener('click', () => {
            if (!currentImage) return;
            exportImage();
        });

        function closeSaveModal() {
            saveModal.classList.remove('active');
        }

        // === BOX BLUR ДЛЯ iOS — РУЧНОЕ УСРЕДНЕНИЕ ПИКСЕЛЕЙ ===
        function applyBoxBlur(canvas, width, height, radius) {
            if (radius <= 0) return canvas;
            
            const ctx = canvas.getContext('2d');
            const imageData = ctx.getImageData(0, 0, width, height);
            const data = imageData.data;
            const output = new Uint8ClampedArray(data);
            
            // Ограничиваем радиус для производительности
            const r = Math.min(radius, 30);
            const r2 = r * 2 + 1;
            const area = r2 * r2;
            
            // Проходим по каждому пикселю
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    let rSum = 0, gSum = 0, bSum = 0, count = 0;
                    
                    // Суммируем соседей в квадрате
                    for (let ky = -r; ky <= r; ky++) {
                        const py = Math.min(height - 1, Math.max(0, y + ky));
                        for (let kx = -r; kx <= r; kx++) {
                            const px = Math.min(width - 1, Math.max(0, x + kx));
                            const idx = (py * width + px) * 4;
                            
                            rSum += data[idx];
                            gSum += data[idx + 1];
                            bSum += data[idx + 2];
                            count++;
                        }
                    }
                    
                    // Записываем среднее
                    const i = (y * width + x) * 4;
                    output[i] = rSum / count;
                    output[i + 1] = gSum / count;
                    output[i + 2] = bSum / count;
                    // Alpha не меняем: output[i + 3] = data[i + 3];
                }
            }
            
            // Копируем результат обратно
            for (let i = 0; i < data.length; i++) {
                data[i] = output[i];
            }
            
            ctx.putImageData(imageData, 0, 0);
            return canvas;
        }

        // Упрощенный blur для больших изображений (быстрее)
        function applyFastBlur(canvas, width, height, radius) {
            if (radius <= 0) return canvas;
            
            // Для больших картинок — уменьшаем, размываем, увеличиваем
            const maxSize = 800;
            if (width > maxSize || height > maxSize) {
                const scale = maxSize / Math.max(width, height);
                const smallW = Math.floor(width * scale);
                const smallH = Math.floor(height * scale);
                
                const small = document.createElement('canvas');
                const smallCtx = small.getContext('2d');
                small.width = smallW;
                small.height = smallH;
                smallCtx.drawImage(canvas, 0, 0, width, height, 0, 0, smallW, smallH);
                
                // Размываем маленькую версию
                applyBoxBlur(small, smallW, smallH, Math.max(1, radius * scale * 0.5));
                
                // Увеличиваем обратно
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, width, height);
                ctx.imageSmoothingEnabled = true;
                ctx.imageSmoothingQuality = 'low';
                ctx.drawImage(small, 0, 0, smallW, smallH, 0, 0, width, height);
                
                return canvas;
            } else {
                // Для маленьких — прямой box blur
                return applyBoxBlur(canvas, width, height, radius);
            }
        }

        async function exportImage() {
            loading.classList.add('active');
            
            // Даем UI обновиться
            await new Promise(r => setTimeout(r, 50));
            
            const ctx = exportCanvas.getContext('2d');
            const width = currentImage.naturalWidth;
            const height = currentImage.naturalHeight;

            exportCanvas.width = width;
            exportCanvas.height = height;

            // 1. Рисуем исходник во временный canvas
            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
            tempCanvas.width = width;
            tempCanvas.height = height;
            tempCtx.drawImage(currentImage, 0, 0, width, height);
            
            // 2. Применяем размытие
            if (currentBlur > 0) {
                if (isIOS) {
                    // iOS: ручной box blur
                    applyFastBlur(tempCanvas, width, height, currentBlur);
                } else {
                    // ПК/Android: CSS filter
                    const blurCanvas = document.createElement('canvas');
                    const blurCtx = blurCanvas.getContext('2d');
                    
                    const padding = Math.ceil(currentBlur * 3);
                    blurCanvas.width = width + padding * 2;
                    blurCanvas.height = height + padding * 2;

                    blurCtx.drawImage(currentImage, padding, padding, width, height);
                    blurCtx.drawImage(currentImage, 0, 0, 1, height, 0, padding, padding, height);
                    blurCtx.drawImage(currentImage, width-1, 0, 1, height, width+padding, padding, padding, height);
                    blurCtx.drawImage(currentImage, 0, 0, width, 1, padding, 0, width, padding);
                    blurCtx.drawImage(currentImage, 0, height-1, width, 1, padding, height+padding, width, padding);

                    blurCtx.filter = `blur(${currentBlur}px)`;
                    blurCtx.drawImage(blurCanvas, 0, 0);
                    blurCtx.filter = 'none';
                    
                    tempCtx.clearRect(0, 0, width, height);
                    tempCtx.drawImage(blurCanvas, padding, padding, width, height, 0, 0, width, height);
                }
            }
            
            // 3. Копируем в exportCanvas
            ctx.drawImage(tempCanvas, 0, 0);

            // Рисуем спиннер
            const centerX = width / 2;
            const centerY = height / 2;
            const previewWidth = previewContainer.offsetWidth;
            const scaleFactor = width / previewWidth;
            const spinnerSize = 80 * scaleFactor;
            const rotation = getCurrentRotation();

            drawTelegramSpinner(ctx, centerX, centerY, spinnerSize, rotation);

            const dataUrl = exportCanvas.toDataURL('image/png');
            
            loading.classList.remove('active');

            if (isAndroid && isTelegramWebView) {
                saveModalImg.src = dataUrl;
                saveModal.classList.add('active');
            } else if (isAndroid) {
                const newWindow = window.open();
                if (newWindow) {
                    newWindow.document.write(`
                        <!DOCTYPE html>
                        <html>
                        <head>
                            <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
                            <title>Сохраните фото</title>
                            <style>
                                * { margin: 0; padding: 0; box-sizing: border-box; }
                                body { 
                                    background: #000; 
                                    display: flex; 
                                    flex-direction: column;
                                    align-items: center; 
                                    justify-content: center; 
                                    min-height: 100vh;
                                    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                                    padding: 20px;
                                }
                                img { 
                                    max-width: 100%; 
                                    max-height: 80vh; 
                                    border-radius: 12px;
                                    margin-bottom: 20px;
                                }
                                .instruction {
                                    color: #fff;
                                    text-align: center;
                                    font-size: 17px;
                                    line-height: 1.5;
                                    margin-bottom: 8px;
                                }
                                .hint {
                                    color: #8e8e93;
                                    text-align: center;
                                    font-size: 14px;
                                }
                            </style>
                        </head>
                        <body>
                            <img src="${dataUrl}" alt="Нажмите и удерживайте для сохранения">
                            <div class="instruction">
                                📱 Удерживайте палец на фото<br>и выберите «Сохранить изображение»
                            </div>
                            <div class="hint">Или «Скачать изображение» в зависимости от браузера</div>
                        </body>
                        </html>
                    `);
                } else {
                    saveModalImg.src = dataUrl;
                    saveModal.classList.add('active');
                }
            } else {
                const link = document.createElement('a');
                link.download = 'telegram-loading-' + Date.now() + '.png';
                link.href = dataUrl;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                showToast();
            }
        }

        function drawTelegramSpinner(ctx, x, y, size, rotation) {
            ctx.save();
            ctx.translate(x, y);

            const scale = size / 156;

            ctx.beginPath();
            ctx.arc(0, 0, 78 * scale, 0, Math.PI * 2);
            ctx.fillStyle = '#484848';
            ctx.fill();

            if (currentBlur > 0) {
                ctx.save();
                ctx.beginPath();
                ctx.arc(0, 0, 78 * scale, 0, Math.PI * 2);
                ctx.clip();

                ctx.globalAlpha = 0.35;

                if (isIOS) {
                    // iOS: упрощенное стекло без сложного blur (чтобы не тормозило)
                    const glassSize = Math.ceil(156 * scale);
                    const glassCanvas = document.createElement('canvas');
                    const glassCtx = glassCanvas.getContext('2d');
                    glassCanvas.width = glassSize;
                    glassCanvas.height = glassSize;

                    const sourceX = (x - 78 * scale) * (currentImage.naturalWidth / exportCanvas.width);
                    const sourceY = (y - 78 * scale) * (currentImage.naturalHeight / exportCanvas.height);
                    const sourceSize = (156 * scale) * (currentImage.naturalWidth / exportCanvas.width);

                    glassCtx.drawImage(currentImage, sourceX, sourceY, sourceSize, sourceSize, 0, 0, glassSize, glassSize);
                    
                    // Упрощенный blur для стекла — просто уменьшаем/увеличиваем
                    const small = document.createElement('canvas');
                    const smallCtx = small.getContext('2d');
                    const s = Math.max(2, Math.floor(glassSize * 0.3));
                    small.width = s;
                    small.height = s;
                    smallCtx.drawImage(glassCanvas, 0, 0, glassSize, glassSize, 0, 0, s, s);
                    
                    glassCtx.clearRect(0, 0, glassSize, glassSize);
                    glassCtx.imageSmoothingEnabled = true;
                    glassCtx.imageSmoothingQuality = 'low';
                    glassCtx.drawImage(small, 0, 0, s, s, 0, 0, glassSize, glassSize);

                    ctx.drawImage(glassCanvas, -78 * scale, -78 * scale, 156 * scale, 156 * scale);
                } else {
                    ctx.filter = `blur(${currentBlur}px)`;
                    ctx.drawImage(currentImage, -x, -y, currentImage.naturalWidth, currentImage.naturalHeight);
                }

                ctx.restore();
            }

            ctx.save();
            ctx.rotate((rotation * Math.PI) / 180);
            ctx.beginPath();
            ctx.arc(0, 0, 63 * scale, 0, Math.PI * 0.33);
            ctx.strokeStyle = '#FFFFFF';
            ctx.lineWidth = 10 * scale;
            ctx.lineCap = 'round';
            ctx.stroke();
            ctx.restore();

            const halfCross = 23 * scale;
            ctx.strokeStyle = '#FFFFFF';
            ctx.lineWidth = 8 * scale;
            ctx.lineCap = 'round';

            ctx.beginPath();
            ctx.moveTo(-halfCross, -halfCross);
            ctx.lineTo(halfCross, halfCross);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(halfCross, -halfCross);
            ctx.lineTo(-halfCross, halfCross);
            ctx.stroke();

            ctx.restore();
        }

        function showToast() {
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }
    </script>
